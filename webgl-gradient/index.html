<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluid Gradient Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="gradient-root" aria-hidden="true">
      <canvas id="gradient-canvas"></canvas>
      <div id="gradient-fallback"></div>
      <div class="gradient-hero"></div>
      <div class="gradient-veil"></div>
    </div>

    <div id="palette-switcher" role="group" aria-label="Gradient palette switcher"></div>

    <main class="page-content">
      <section class="panel">
        <h1>Fluid Shader Background</h1>
        <p>
          Single-canvas, fragment-shader-driven gradient with cursor-reactive color flow,
          simplex noise movement, hero emphasis, and CSS fallback for non-WebGL contexts.
        </p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
